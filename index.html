  <style>
    :root {

      --paper: #fcfbfa;

    body.mode-professional {

      --ink: #111111;
      --muted: rgba(0, 0, 0, 0.55);
      --rule: rgba(0, 0, 0, 0.12);

      opacity: 0.9;

    .shell {

      display: flex;
      flex-direction: column;
      position: relative;
      z-index: 1;
    }

    .top-toggle {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      display: flex;
      justify-content: center;
      padding: 2rem 1rem 1rem;
      z-index: 5;
      backdrop-filter: blur(2px);
    }

    .top-toggle.hidden { display: none; }

    .top-toggle button {
      font: inherit;
      background: transparent;
      border: 0;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      font-size: 0.72rem;
      padding: 0.2rem 0.4rem;
      cursor: pointer;
      opacity: 0.45;
      border-bottom: 1px solid transparent;
      color: var(--ink);
    }

    .top-toggle button.active {
      opacity: 1;
      border-bottom-color: currentColor;
      font-weight: 700;
    }

    .top-toggle span {
      margin: 0 0.8rem;
      opacity: 0.25;
    }

    .night-toggle {
      position: fixed;
      top: 1.3rem;
      right: 1.3rem;
      z-index: 6;
      width: 36px;
      height: 36px;
      border-radius: 999px;
      background: transparent;
      border: 1px solid var(--rule);
      box-shadow: none;
      padding: 0;
      cursor: pointer;
      opacity: 0.95;
    }

    .night-toggle::before {
      content: "";
      position: absolute;
      inset: 8px;
      border-radius: 999px;
      background: #f2c94c;
      opacity: 0.95;
      box-shadow:
        0 -9px 0 -6px #f2c94c,
        0 9px 0 -6px #f2c94c,
        9px 0 0 -6px #f2c94c,
        -9px 0 0 -6px #f2c94c,
        6px 6px 0 -6px #f2c94c,
        -6px 6px 0 -6px #f2c94c,
        6px -6px 0 -6px #f2c94c,
        -6px -6px 0 -6px #f2c94c;
    }

    body.night .night-toggle::before {
      background: var(--ink);
      box-shadow: none;
    }

    body.night .night-toggle::after {
      content: "";
      position: absolute;
      width: 12px;
      height: 12px;
      border-radius: 999px;
      background: var(--bg);
      top: 8px;
      left: 15px;
    }

    .neon-note {

    .neon-note.show { opacity: 0.95; }


    .scavenger-word {

      color: #caff7a;
      border-color: rgba(202, 255, 122, 0.7);
      text-shadow:
        0 0 10px rgba(202, 255, 122, 0.7),

    }

    .scavenger-word.disabled {
      pointer-events: none;
      color: inherit;
      border-color: transparent;
      text-shadow: none;
    }

    .list {

      padding: 0;
      display: grid;
      gap: 0.75rem;

        <section>

  </div>

  <script>
    const content = window.CONTENT;

    const landing = document.getElementById("landing");
    const professional = document.getElementById("professional");
    const human = document.getElementById("human");
    const topToggle = document.getElementById("top-toggle");
    const toggleProfessional = document.getElementById("toggle-professional");
    const toggleHuman = document.getElementById("toggle-human");

    const landingTitle = document.getElementById("landing-title");
    const landingWork = document.getElementById("landing-work");
    const landingMe = document.getElementById("landing-me");

    const professionalBio = document.getElementById("professional-bio");
    const substackFeed = document.getElementById("substack-feed");
    const digibodh = document.getElementById("digibodh");
    const vibeTools = document.getElementById("vibe-tools");
    const workWithMe = document.getElementById("work-with-me");
    const contactEmailProf = document.getElementById("contact-email-prof");
    const linkedinConnectProf = document.getElementById("linkedin-connect-prof");

    const humanName = document.getElementById("human-name");
    const humanHero = document.getElementById("human-hero");
    const humanClue = document.getElementById("human-clue");
    const currentlyList = document.getElementById("currently-list");
    const lifeStory = document.getElementById("life-story");
    const writingList = document.getElementById("writing-list");
    const contactEmailHuman = document.getElementById("contact-email-human");

    const poemOverlay = document.getElementById("poem-overlay");
    const poemTitle = document.getElementById("poem-title");
    const poemQuestion = document.getElementById("poem-question");
    const poemOptions = document.getElementById("poem-options");
    const poemBody = document.getElementById("poem-body");
    const poemBack = document.getElementById("poem-back");
    const poemClose = document.getElementById("poem-close");
    const scavengerPrompt = document.getElementById("scavenger-prompt");
    const nightToggle = document.getElementById("night-toggle");
    const neonNote = document.getElementById("neon-note");
    const resumeOverlay = document.getElementById("resume-overlay");
    const resumeFrame = document.getElementById("resume-frame");
    const resumeClose = document.getElementById("resume-close");
    const resumeLink = document.getElementById("resume-link");
    const supportNoteProfessional = document.getElementById("support-note-professional");
    const supportNoteProfessionalText = document.getElementById("support-note-professional-text");
    const supportNoteHuman = document.getElementById("support-note-human");
    const supportNoteHumanText = document.getElementById("support-note-human-text");

    let mode = null;
    let scavengerStep = 1;
    let openPoemFromScavenger = null;
    let neonTimer = null;

    function renderSupportNotes() {
      supportNoteProfessional.href = content.professional.supportWidget.url;
      supportNoteProfessional.style.setProperty("--support-accent", content.professional.supportWidget.color);
      supportNoteProfessionalText.textContent = content.professional.supportWidget.message;

      supportNoteHuman.href = content.human.supportWidget.url;
      supportNoteHuman.style.setProperty("--support-accent", content.human.supportWidget.color);
      supportNoteHumanText.textContent = content.human.supportWidget.message;
    }

    function setMode(nextMode) {
      mode = nextMode;
      document.body.classList.remove("mode-professional", "mode-human");
      landing.classList.add("hidden");
      topToggle.classList.remove("hidden");
      professional.classList.remove("active");
      human.classList.remove("active");

      if (mode === "professional") {
        document.body.classList.add("mode-professional");
        professional.classList.add("active");
        toggleProfessional.classList.add("active");
        toggleHuman.classList.remove("active");
      }

      if (mode === "human") {
        document.body.classList.add("mode-human");
        human.classList.add("active");
        toggleHuman.classList.add("active");
        toggleProfessional.classList.remove("active");
      }

      setInkVisibility();
      if (mode === "human" && document.body.classList.contains("night")) {
        scavengerStep = 1;
        showNeonNote(content.human.scavenger.step1);
      }
      updateScavengerState();
    }

    function resetToLanding() {
      mode = null;
      document.body.classList.remove("mode-professional", "mode-human");
      landing.classList.remove("hidden");
      topToggle.classList.add("hidden");
      professional.classList.remove("active");
      human.classList.remove("active");
      toggleProfessional.classList.remove("active");
      toggleHuman.classList.remove("active");
      setInkVisibility();
      updateScavengerState();
      setNightMode(false);
    }

    function renderLanding() {
      landingTitle.textContent = `hi i am ${content.name}`;
    }

    function renderProfessional() {
      professionalBio.textContent = content.professional.bio;
      contactEmailProf.textContent = content.contactEmail;
      contactEmailProf.href = `mailto:${content.contactEmail}`;
      linkedinConnectProf.href = content.professional.linkedinUrl;

      digibodh.innerHTML = `
        <div>
          <h3 style="margin:0 0 0.4rem; font-size:0.95rem;">${content.professional.digibodh.name}</h3>
          <p style="margin:0 0 0.6rem;" class="muted">${content.professional.digibodh.description}</p>
          <a href="${content.professional.digibodh.url}" target="_blank" rel="noreferrer">visit project ↗</a>
        </div>
      `;

      vibeTools.innerHTML = content.professional.vibeTools.map((tool, index) => `
        <article class="vibe-tool-item">
          <div class="vibe-tool-index">${String(index + 1).padStart(2, "0")}</div>
          <div class="vibe-tool-main">
            <h3>${tool.name}</h3>
            <p>${tool.description}</p>
            <a href="${tool.url}" target="_blank" rel="noreferrer">visit ↗</a>
          </div>
        </article>
      `).join("");

      workWithMe.innerHTML = `
        <p>${content.professional.workWithMe.intro}</p>
        <button
          type="button"
          data-tally-open="${content.professional.workWithMe.tallyId}"
          data-tally-width="${content.professional.workWithMe.tallyWidth}"
          data-tally-emoji-text="${content.professional.workWithMe.tallyEmojiText}"
          data-tally-emoji-animation="${content.professional.workWithMe.tallyEmojiAnimation}"
          data-tally-auto-close="${content.professional.workWithMe.tallyAutoClose}"
        >${content.professional.workWithMe.ctaLabel}</button>
      `;
    }

    function renderHuman() {
      humanName.textContent = content.name;
      renderHeroScavenger();
      humanClue.textContent = content.human.clue || "";

      currentlyList.innerHTML = "";
      const currentItems = [
        ["Reading", content.human.currently.reading],
        ["Writing", content.human.currently.writing],
        ["Working on", content.human.currently.workingOn],
        ["Listening to", content.human.currently.listeningTo]
      ];
      currentItems.forEach(([label, value]) => {
        if (!value) return;
        const li = document.createElement("li");
        if (label === "Listening to" && content.human.currently.listeningUrl) {
          li.innerHTML = `<span class="muted" style="display:inline-block; width:120px; text-transform:uppercase; letter-spacing:0.12em; font-size:0.72rem;">${label}</span><a href="${content.human.currently.listeningUrl}" target="_blank" rel="noreferrer">${value}</a>`;
        } else {
          li.innerHTML = `<span class="muted" style="display:inline-block; width:120px; text-transform:uppercase; letter-spacing:0.12em; font-size:0.72rem;">${label}</span>${value}`;
        }
        currentlyList.appendChild(li);
      });

      lifeStory.innerHTML = "";
      content.human.lifeStoryEras.forEach((era) => {
        const block = document.createElement("div");
        block.innerHTML = `<h3>${era.era}</h3><p style="margin:0;">${highlightFirstTwo(era.text, content.human.scavenger.word1, content.human.scavenger.word2)}</p>`;
        lifeStory.appendChild(block);
      });

      const word1El = lifeStory.querySelector(".word1");
      const word2El = lifeStory.querySelector(".word2");

      if (word1El) {
        word1El.addEventListener("click", () => {
          if (mode !== "human" || !document.body.classList.contains("night")) return;
          if (scavengerStep === 1) {
            scavengerStep = 2;
            const rect = word1El.getBoundingClientRect();
            showNeonNote(
              content.human.scavenger.step2,
              { x: Math.max(12, rect.left - 40), y: rect.top - 40 },
              3500
            );
            updateScavengerState();
          }
        });
      }

      if (word2El) {
        word2El.addEventListener("click", () => {
          if (mode !== "human" || !document.body.classList.contains("night")) return;
          if (scavengerStep === 2 && openPoemFromScavenger) {
            openPoemFromScavenger();
          }
        });
      }

      writingList.innerHTML = "";
      content.human.writing.forEach((piece) => {
        const li = document.createElement("li");
        li.className = "writing-item";
        li.innerHTML = `
          <a href="${piece.url}" target="_blank" rel="noreferrer">${piece.title}</a>
          <span class="muted" style="font-size:0.75rem;">${piece.publication}</span>
        `;
        writingList.appendChild(li);
      });

      contactEmailHuman.textContent = content.contactEmail;
      contactEmailHuman.href = `mailto:${content.contactEmail}`;
    }

    function highlightFirstTwo(text, word1, word2) {
      if (!text) return "";
      let result = text;
      const re1 = new RegExp(`\\b(${word1})\\b`, "i");
      const re2 = new RegExp(`\\b(${word2})\\b`, "i");
      result = result.replace(re1, '<span class="scavenger-word word1">$1</span>');
      result = result.replace(re2, '<span class="scavenger-word word2">$1</span>');
      return result;
    }

    function wrapWord(text, word, className) {
      const lower = text.toLowerCase();
      const target = word.toLowerCase();
      const idx = lower.indexOf(target);
      if (idx === -1) return text;
      const before = text.slice(0, idx);
      const match = text.slice(idx, idx + word.length);
      const after = text.slice(idx + word.length);
      return `${before}<span class="${className}">${match}</span>${after}`;
    }

    function renderHeroScavenger() {
      humanHero.textContent = content.human.hero;
      updateScavengerState();
    }

    function updateScavengerState() {
      const sc = content.human.scavenger;
      const isNight = document.body.classList.contains("night");
      const isHuman = mode === "human";
      const word1El = lifeStory.querySelector(".word1");
      const word2El = lifeStory.querySelector(".word2");

      if (!isHuman) {
        scavengerPrompt.textContent = "";
        if (neonNote) neonNote.classList.remove("show");
        if (word1El) word1El.classList.add("disabled");
        if (word2El) word2El.classList.add("disabled");
        return;
      }

      if (!isNight) {
        scavengerPrompt.textContent = sc.dayPrompt || "";
        scavengerPrompt.style.opacity = sc.dayPrompt ? "0.75" : "0";
        if (neonNote) neonNote.classList.remove("show");
        if (word1El) word1El.classList.add("disabled");
        if (word2El) word2El.classList.add("disabled");
        return;
      }

      if (scavengerStep === 1) {
        scavengerPrompt.textContent = "";
        scavengerPrompt.style.opacity = "0";
        if (word1El) word1El.classList.add("active");
        if (word1El) word1El.classList.remove("disabled");
        if (word2El) word2El.classList.add("disabled");
        if (word2El) word2El.classList.remove("active");
      } else {
        scavengerPrompt.textContent = "";
        scavengerPrompt.style.opacity = "0";
        if (word1El) word1El.classList.add("disabled");
        if (word1El) word1El.classList.remove("active");
        if (word2El) word2El.classList.remove("disabled");
        if (word2El) word2El.classList.add("active");
      }
    }

    function showNeonNote(text, position, durationMs = 5000) {
      if (!neonNote) return;
      if (!text) {
        neonNote.classList.remove("show");
        return;
      }
      if (position && typeof position.x === "number" && typeof position.y === "number") {
        neonNote.style.left = `${position.x}px`;
        neonNote.style.top = `${position.y}px`;
      } else {
        neonNote.style.left = "";
        neonNote.style.top = "";
      }
      neonNote.textContent = text;
      neonNote.classList.add("show");
      if (neonTimer) clearTimeout(neonTimer);
      neonTimer = setTimeout(() => {
        neonNote.classList.remove("show");
      }, durationMs);
    }

    async function renderSubstack() {
      substackFeed.innerHTML = "<div class=\"muted\">Loading recent articles...</div>";

      try {
        const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(content.professional.substackRss)}`);
        if (!res.ok) throw new Error("rss failed");
        const data = await res.json();
        const items = (data.items || []).slice(0, 3);

        if (!items.length) throw new Error("no items");

        substackFeed.innerHTML = "";
        items.forEach((item) => {
          const date = new Date(item.pubDate);
          const formatted = isNaN(date.getTime())
            ? item.pubDate
            : date.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
          const row = document.createElement("div");
          row.innerHTML = `
            <a href="${item.link}" target="_blank" rel="noreferrer">${item.title}</a>
            <div class="muted" style="font-size:0.75rem; margin-top:0.2rem;">${formatted}</div>
          `;
          substackFeed.appendChild(row);
        });
      } catch (err) {
        substackFeed.innerHTML = `
          <a href="${content.professional.substackUrl}" target="_blank" rel="noreferrer">Read the latest on Substack →</a>
        `;
      }
    }

    function setupPoem() {
      function openPoem() {
        poemOverlay.classList.add("open");
        renderPoemMenu();
      }

      function closePoem() {
        poemOverlay.classList.remove("open");
      }

      function renderPoemMenu() {
        poemTitle.textContent = content.poemExperience.title;
        poemQuestion.textContent = `${content.poemExperience.question}?`;
        poemOptions.innerHTML = "";
        poemBody.textContent = "";
        poemBack.style.display = "none";

        content.poemExperience.options.forEach((option) => {
          const btn = document.createElement("button");
          btn.type = "button";
          btn.textContent = option.label;
          btn.addEventListener("click", () => renderPoem(option));
          poemOptions.appendChild(btn);
        });
      }

      function renderPoem(option) {
        poemQuestion.textContent = `${content.poemExperience.question}: ${option.label}`;
        poemOptions.innerHTML = "";
        poemBack.style.display = "block";
        poemBody.textContent = option.poem;
      }

      openPoemFromScavenger = openPoem;

      poemClose.addEventListener("click", closePoem);
      poemBack.addEventListener("click", renderPoemMenu);
      poemOverlay.addEventListener("click", (e) => {
        if (e.target === poemOverlay || e.target.classList.contains("poem-backdrop")) closePoem();
      });

      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape") closePoem();
      });
    }

    function setupResume() {
      const resumeUrl = content.professional.resumeUrl;
      function openResume() {
        if (!resumeUrl) return;
        resumeFrame.src = resumeUrl;
        resumeOverlay.classList.add("open");
      }

      function closeResume() {
        resumeOverlay.classList.remove("open");
        resumeFrame.src = "";
      }

      resumeLink.addEventListener("click", (e) => {
        e.preventDefault();
        openResume();
      });
      resumeClose.addEventListener("click", closeResume);
      resumeOverlay.addEventListener("click", (e) => {
        if (e.target === resumeOverlay || e.target.classList.contains("poem-backdrop")) closeResume();
      });
    }

    function setupInkBlooms() {
      const canvas = document.getElementById("ink-canvas");
      const ctx = canvas.getContext("2d");
      const blooms = [];
      let animationFrameId;

      function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      }

      function addBloom(e) {
        const baseColors = [
          "252, 225, 56",
          "230, 74, 56",
          "241, 137, 45",
          "74, 140, 224",
          "166, 109, 226",
          "117, 200, 60",
          "108, 209, 164"
        ];
        const colorRGB = baseColors[Math.floor(Math.random() * baseColors.length)];
        const numBlobs = 2 + Math.floor(Math.random() * 2);

        for (let b = 0; b < numBlobs; b += 1) {
          const points = [];
          const numPoints = 12 + Math.floor(Math.random() * 6);

          for (let i = 0; i < numPoints; i += 1) {
            points.push({
              angle: (i / numPoints) * Math.PI * 2,
              radius: 5 + Math.random() * 10,
              maxRadius: 40 + Math.random() * 120,
              velocity: 2 + Math.random() * 4
            });
          }

          blooms.push({
            x: e.clientX + (Math.random() - 0.5) * 30,
            y: e.clientY + (Math.random() - 0.5) * 30,
            colorRGB,
            points,
            opacity: 1,
            delay: Math.random() * 15
          });
        }
      }

      function render() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        blooms.forEach((bloom) => {
          let isGrowing = false;
          bloom.points.forEach((p) => {
            if (p.radius < p.maxRadius) {
              p.radius += p.velocity;
              p.velocity *= 0.88;
              if (p.velocity > 0.1) isGrowing = true;
            }
          });

          if (!isGrowing && bloom.delay > 0) {
            bloom.delay -= 1;
          } else if (!isGrowing) {
            bloom.opacity -= 0.015;
          }

          if (bloom.opacity <= 0) return;

          ctx.beginPath();
          const pts = bloom.points.map((p) => ({
            x: bloom.x + Math.cos(p.angle) * p.radius,
            y: bloom.y + Math.sin(p.angle) * p.radius
          }));

          ctx.moveTo((pts[0].x + pts[pts.length - 1].x) / 2, (pts[0].y + pts[pts.length - 1].y) / 2);
          for (let i = 0; i < pts.length; i += 1) {
            const p1 = pts[i];
            const p2 = pts[(i + 1) % pts.length];
            const midX = (p1.x + p2.x) / 2;
            const midY = (p1.y + p2.y) / 2;
            ctx.quadraticCurveTo(p1.x, p1.y, midX, midY);
          }
          ctx.closePath();

          ctx.fillStyle = `rgba(${bloom.colorRGB}, ${bloom.opacity * 0.25})`;
          ctx.fill();
          ctx.lineWidth = 1.5;
          ctx.strokeStyle = `rgba(${bloom.colorRGB}, ${bloom.opacity * 0.4})`;
          ctx.stroke();
        });

        for (let i = blooms.length - 1; i >= 0; i -= 1) {
          if (blooms[i].opacity <= 0) blooms.splice(i, 1);
        }

        animationFrameId = requestAnimationFrame(render);
      }

      window.addEventListener("resize", resize);
      window.addEventListener("click", addBloom);
      resize();
      render();

      return () => {
        window.removeEventListener("resize", resize);
        window.removeEventListener("click", addBloom);
        cancelAnimationFrame(animationFrameId);
      };
    }

    function setInkVisibility() {
      const canvas = document.getElementById("ink-canvas");
      canvas.style.display = mode === "human" ? "block" : "none";
    }

    function setNightMode(isNight) {
      document.body.classList.toggle("night", isNight);
      nightToggle.setAttribute("aria-label", isNight ? "Switch to day mode" : "Switch to night mode");
      localStorage.setItem("site-night", isNight ? "night" : "day");
      if (isNight && mode === "human") scavengerStep = 1;
      if (isNight && mode === "human") {
        showNeonNote(content.human.scavenger.step1);
      }
      updateScavengerState();
    }

    landingWork.addEventListener("click", () => setMode("professional"));
    landingMe.addEventListener("click", () => setMode("human"));
    toggleProfessional.addEventListener("click", () => setMode("professional"));
    toggleHuman.addEventListener("click", () => setMode("human"));
    nightToggle.addEventListener("click", () => {
      const next = !document.body.classList.contains("night");
      setNightMode(next);
    });

    renderLanding();
    renderProfessional();
    renderHuman();
    renderSupportNotes();
    renderSubstack();
    setupPoem();
    setupResume();
    setupInkBlooms();
    resetToLanding();

    const savedNight = localStorage.getItem("site-night");
    setNightMode(savedNight === "night");
  </script>
